<!DOCTYPE html>
<html lang="en" id="html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Paint</title>
    <script src="script.js" defer></script>
</head>
<body style="background-color: lightgray;">
    <div>
    <img src="AKPAINT.png"width="500">
    <img src="AKPAINT-AKPAINT-AKPAINT-AKPAINT (1).png" width="300" style="display:inline-block">
    <div id="toolbar">
        <input id="sizeInput" value="10" size="1"> brush size<strong id="qem2">⍰</strong></input>
        <input id="colorinput" value="black" size="1">Color<strong id="qem1">⍰</strong></input>
        <input id="opacity" value="1.0" size="1">Fade<strong id="qem3">⍰</strong></input>
        <input id="naming" size="6">Name of art<strong id="qem4">⍰</strong></input>
    </div>
    <img src="AKPAINT-AKPAINT-AKPAINT.png" width="300" style="float:right">
    <div id="canvases">
    <canvas id="canvas" width="700" style="background-color: white;" height="500">
    </canvas>
    </div>
    <div id="brushbar">
        <p>Current brush: <strong id="current">Default</strong></p>
        <p>Brushes:</p>
    </div>
    <div>
    <div id="bgbar">
        <p>Backgrounds:</p>
       
    </div>
    <div id="BGmode">
        <p>Mode:</p>
    </div>
    <div id="musicDiv">
    <button id="music">Mute this god awful music</button>
    </div>
    </div>
    
</body>
</html>
